<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litsalus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap');
:root{
    --amber:#d18b23;
    --amber2:#f5d8a2;
    --paper:#fffdf8;
    --ink:#222;
    --accent:#1368ce;
    --good:#1b8f42;
    --bad:#cf2d2d;
    --shadow:0 12px 35px rgba(0,0,0,.18);
}

*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Lora, serif;
    background:linear-gradient(135deg,#00002E,#00002E);
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:24px;
}

.game{
    width:min(900px,100%);
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
}

h1{
    margin:0;
    font-size:2rem;
    color:white;
}

.stats{
    display:flex;
    gap:20px;
    font-weight:700;
}

.hearts{
    color:#d33;
    font-size:1.4rem;
}

.label{
    background:linear-gradient(90deg,var(--amber) 0 28px,var(--paper) 28px);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow:hidden;
    border:4px solid #c27d13;
}

.label-inner{
    padding:26px 26px 26px 42px;
}

.rx{
    font-size:2.5rem;
    color:#8d4f00;
    font-weight:900;
    margin-bottom:8px;
}

.pharmacy{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    border-bottom:2px dashed #bbb;
    padding-bottom:10px;
    margin-bottom:16px;
    gap:8px;
}

.med{
    font-size:1.5rem;
    font-weight:700;
}

.grid{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:center;
}

.sig{
    background:#fff;
    border:2px solid #ddd;
    padding:16px;
    border-radius:12px;
    font-size:1.2rem;
}

.highlight{
    background:yellow;
    font-weight:900;
    padding:2px 5px;
    border-radius:4px;
}

.offer{
    margin-top:20px;
    background:#eef7ff;
    border-left:5px solid var(--accent);
    padding:16px;
    border-radius:10px;
    font-size:1.15rem;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:26px;
}

button{
    flex:1;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:1.1rem;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
}

.correct{
    background:var(--good);
    color:white;
}

.incorrect{
    background:var(--bad);
    color:white;
}

button:hover{
    transform:translateY(-2px);
}

.feedback{
    margin-top:18px;
    min-height:28px;
    font-weight:700;
    font-size:1.05rem;
}

.flash{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:0;
    transition:opacity .3s;
    z-index:9999;
}

.flash.show{
    opacity:.35;
}

.flash.correct{
    background:#2ecc71;
}

.flash.incorrect{
    background:#e74c3c;
}

.overlay{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.7);
}

.panel{
    background:white;
    padding:40px;
    border-radius:18px;
    text-align:center;
    width:min(400px,90%);
}

.panel h2{
    margin-top:0;
}

.restart{
    background:var(--accent);
    color:white;
    margin-top:18px;
}

.small{
    color:white;
    font-size:.92rem;
}

.stats{
    color:white;
}

@media(max-width:650px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="game">

<header>
<div>
<h1> Litsalus </h1>
<div class="small">Decide whether the offered translation is completely correct.</div>
</div>

<div class="stats">
<div>Score: <span id="score">0</span></div>
<div>Best: <span id="best">0</span></div>
<div class="hearts" id="hearts"></div>
</div>
</header>

<div class="label">
<div class="label-inner">

<div class="rx">℞</div>

<div class="pharmacy">
<div>
<div><strong>Community Care Pharmacy</strong></div>
<div>Patient: <span id="patient"></span></div>
</div>

<div>
<div id="rxnum"></div>
<div id="date"></div>
</div>
</div>

<div class="med" id="med"></div>

<div class="grid">
<div class="sig">
SIG:
<span id="sig"></span>
</div>

<div>
Qty:
<div id="qty"></div>
</div>
</div>

<div class="offer">
<strong>Does this match the highlighted instruction?</strong>
<p id="translation"></p>
</div>

<div class="buttons">
<button class="correct" onclick="answer(true)"> Yes </button>
<button class="incorrect" onclick="answer(false)"> No </button>
</div>

<div class="feedback" id="feedback"></div>

</div>
</div>

</div>

<div class="overlay" id="gameOver">
<div class="panel">
<h2>Game Over</h2>
<p>Your High Score</p>
<h1 id="finalScore"></h1>
<button class="restart" onclick="restart()">Play Again</button>
</div>
</div>
<div id="flash" class="flash"></div>

<script>

const firstNames = [
  "James","Mary","John","Patricia","Robert","Jennifer",
  "Michael","Linda","William","Elizabeth","David","Susan",
  "Richard","Jessica","Joseph","Sarah","Thomas","Emily",
  "Daniel","Ashley","Christopher","Olivia","Matthew","Sophia",
  "Anthony","Emma","Noah","Ava","Liam","Charlotte"
];

const lastNames = [
  "Smith","Johnson","Williams","Brown","Jones","Garcia",
  "Miller","Davis","Rodriguez","Martinez","Hernandez",
  "Lopez","Gonzalez","Wilson","Anderson","Thomas",
  "Taylor","Moore","Jackson","Martin","Lee","Perez",
  "Thompson","White","Harris","Clark","Lewis","Young"
];

function randomPatientName() {
    return `${rand(firstNames)} ${rand(lastNames)}`;
}
    
const meds=[
"Amoxicillin 500 mg Capsules",
"Lisinopril 10 mg Tablets",
"Metformin 500 mg Tablets",
"Atorvastatin 20 mg Tablets",
"Ibuprofen 600 mg Tablets",
"Levothyroxine 50 mcg Tablets",
"Cephalexin 500 mg Capsules",
"Prednisone 20 mg Tablets",
"Azithromycin 250 mg Tablets",
"Losartan 50 mg Tablets"
];

const quantities=[20,30,60,90,120];

const doseOptions=[
{text:"Take 1 tablet"},
{text:"Take 2 tablets"},
{text:"Take 1 capsule"},
{text:"Take 2 capsules"}
];

const routes=[
{text:"by mouth"},
{text:"under the tongue"},
{text:"into the left eye"},
{text:"into the right eye"},
{text:"into both eyes"}
];

const freqs=[
{text:"once daily"},
{text:"twice daily"},
{text:"three times daily"},
{text:"every 4 hours"},
{text:"every 6 hours"},
{text:"at bedtime"}
];

let score=0;
let hearts=3;
let currentCorrect=true;

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");

let best=Number(localStorage.getItem("sigBest")||0);
bestEl.textContent=best;

function rand(a){
return a[Math.floor(Math.random()*a.length)];
}

function randomDate(){
return new Date().toLocaleDateString();
}

function makePuzzle(){

document.getElementById("feedback").textContent="";


const med=rand(meds);
const qty=rand(quantities);
const dose=rand(doseOptions);
const route=rand(routes);
const freq=rand(freqs);

// Which part should be highlighted?
const highlightIndex=Math.floor(Math.random()*3);

let sigHTML="";

if(highlightIndex===0){
sigHTML=`<span class="highlight">${dose.text}</span> ${route.text} ${freq.text}.`;
}

if(highlightIndex===1){
sigHTML=`${dose.text} <span class="highlight">${route.text}</span> ${freq.text}.`;
}

if(highlightIndex===2){
sigHTML=`${dose.text} ${route.text} <span class="highlight">${freq.text}</span>.`;
}

document.getElementById("sig").innerHTML=sigHTML;

// The offered translation
let translation=`${dose.text} ${route.text} ${freq.text}.`;

currentCorrect=Math.random()<0.5;

if(!currentCorrect){

const error=Math.floor(Math.random()*3);

if(error===0){

let wrong=rand(doseOptions);
while(wrong.text===dose.text)
wrong=rand(doseOptions);

translation=`${wrong.text} ${route.text} ${freq.text}.`;

}

if(error===1){

let wrong=rand(routes);
while(wrong.text===route.text)
wrong=rand(routes);

translation=`${dose.text} ${wrong.text} ${freq.text}.`;

}

if(error===2){

let wrong=rand(freqs);
while(wrong.text===freq.text)
wrong=rand(freqs);

translation=`${dose.text} ${route.text} ${wrong.text}.`;

}

}

document.getElementById("translation").textContent=translation;
document.getElementById("med").textContent=med;
document.getElementById("qty").textContent=qty;
document.getElementById("date").textContent=randomDate();
document.getElementById("rxnum").textContent="Rx #"+Math.floor(100000+Math.random()*900000);
document.getElementById("patient").textContent = randomPatientName();

}

function answer(playerSaysCorrect){

if(playerSaysCorrect===currentCorrect){
    flashScreen("correct");

score++;
scoreEl.textContent=score;

if(score>best){
best=score;
localStorage.setItem("sigBest",best);
bestEl.textContent=best;
}

document.getElementById("feedback").style.color="green";
document.getElementById("feedback").textContent="Correct!";
makePuzzle();

}else{

hearts--;
updateHearts();

document.getElementById("feedback").style.color="red";
document.getElementById("feedback").textContent="Incorrect.";

if(hearts<=0){
gameOver();
}else{
makePuzzle();
}

}

}

function updateHearts(){

document.getElementById("hearts").textContent=
"❤️".repeat(hearts)+"🖤".repeat(3-hearts);

}

function gameOver(){

document.getElementById("finalScore").textContent=best;
document.getElementById("gameOver").style.display="flex";

}

function restart(){

score=0;
hearts=3;
scoreEl.textContent=0;
updateHearts();
document.getElementById("gameOver").style.display="none";
makePuzzle();

}

function flashScreen(type){

    const flash=document.getElementById("flash");

    flash.className="flash "+type+" show";

    setTimeout(()=>{
        flash.classList.remove("show");
    },300);

}

updateHearts();
makePuzzle();

</script>

</body>
</html>
